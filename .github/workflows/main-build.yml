name: build-main

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # https://github.com/synle/workflows/blob/main/.github/workflows/build-and-commit-sh.yml
    uses: synle/workflows/.github/workflows/build-and-commit-sh.yml@main
    permissions:
      contents: write
      pages: write
      id-token: write
    with:
      node-version: "24.x"
      early-exit-on-commit: false
      deploy-to-pages: true
